<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>{{TITLE}} — elko.ai</title>
<style>
  :root {
    --bg: #f8f9fc;
    --surface: #ffffff;
    --text-primary: #1a1a2e;
    --text-secondary: #5a5a7a;
    --text-muted: #8892b0;
    --accent: #4a6cf7;
    --accent-light: #6c63ff;
    --accent-gradient: linear-gradient(135deg, #4a6cf7, #6c63ff);
    --border: #e2e6f0;
    --card-shadow: 0 2px 12px rgba(74,108,247,0.08);
    --card-radius: 12px;
    --bar-bg: #eef0f8;
    --tag-bg: #eef0f8;
    --tag-text: #4a6cf7;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --chart-colors: #4a6cf7, #6c63ff, #818cf8, #a78bfa, #c4b5fd, #f472b6, #fb7185, #f87171, #fbbf24, #34d399;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1118;
      --surface: #1a1d2e;
      --text-primary: #e2e4f0;
      --text-secondary: #9ea0b8;
      --text-muted: #6b6d8a;
      --border: #2a2d40;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.3);
      --bar-bg: #252840;
      --tag-bg: #252840;
      --tag-text: #818cf8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    background: var(--bg); color: var(--text-primary);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

  /* HEADER */
  .report-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; flex-wrap: wrap; gap: 12px;
  }
  .report-logo svg { display: block; }
  .series-badge {
    display: inline-block; background: var(--accent-gradient);
    color: #fff; font-size: 10px; font-weight: 600; padding: 4px 12px;
    border-radius: 20px; letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .report-title { font-size: 28px; font-weight: 800; line-height: 1.3; margin-bottom: 4px; }
  .report-meta {
    display: flex; flex-wrap: wrap; gap: 16px;
    font-size: 12px; color: var(--text-muted); margin-bottom: 20px;
  }
  .report-meta span { display: flex; align-items: center; gap: 4px; }
  .divider { border: none; height: 1px; background: var(--border); margin: 20px 0; }

  /* TOP STORY / HERO */
  .hero-card {
    background: var(--surface); border-radius: var(--card-radius);
    box-shadow: var(--card-shadow); padding: 24px;
    border-left: 4px solid var(--accent); margin-bottom: 24px;
  }
  .hero-card h2 {
    font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 6px;
  }
  .hero-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }

  /* METRIC ROW */
  .metric-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .metric-card {
    background: var(--surface); border-radius: var(--card-radius);
    box-shadow: var(--card-shadow); padding: 18px 14px; text-align: center;
    transition: transform 0.2s; border: 1px solid var(--border);
  }
  .metric-card:hover { transform: translateY(-2px); }
  .metric-value {
    font-size: 32px; font-weight: 800;
    background: var(--accent-gradient); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }
  .metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* SECTION HEADERS */
  .section-header {
    display: flex; align-items: center; gap: 10px; margin: 28px 0 12px;
  }
  .section-header .icon { font-size: 20px; }
  .section-header h2 { font-size: 18px; font-weight: 700; color: var(--text-primary); }
  .section-header .accent-line { flex: 1; height: 2px; background: var(--accent-gradient); border-radius: 2px; }
  .section-body { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.8; }

  /* ENTITY CARDS */
  .entity-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .entity-card {
    background: var(--surface); border-radius: var(--card-radius);
    box-shadow: var(--card-shadow); padding: 14px;
    border: 1px solid var(--border); text-align: center;
    transition: transform 0.2s;
  }
  .entity-card:hover { transform: translateY(-2px); }
  .entity-value {
    font-size: 24px; font-weight: 800; color: var(--accent);
  }
  .entity-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* BAR CHARTS */
  .chart-container { margin: 16px 0 24px; background: var(--surface); border-radius: var(--card-radius); box-shadow: var(--card-shadow); padding: 20px; border: 1px solid var(--border); }
  .bar-row { display: flex; align-items: center; margin-bottom: 4px; gap: 0; }
  .bar-label { width: 130px; font-size: 12px; color: var(--text-secondary); text-align: right; padding-right: 12px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 20px; background: var(--bar-bg); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; position: relative; }
  .bar-fill::after {
    content: attr(data-pct); position: absolute; right: 6px; top: 50%;
    transform: translateY(-50%); font-size: 10px; font-weight: 600; color: #fff;
    opacity: 0; transition: opacity 0.3s;
  }
  .bar-fill:hover::after { opacity: 1; }
  .bar-count { width: 36px; font-size: 12px; font-weight: 600; color: var(--text-muted); padding-left: 8px; flex-shrink: 0; }

  /* TIMELINE */
  .timeline { position: relative; margin: 16px 0 24px; padding-left: 24px; }
  .timeline::before {
    content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px;
    width: 2px; background: var(--accent-gradient); border-radius: 2px;
  }
  .timeline-item {
    position: relative; margin-bottom: 12px; padding: 10px 14px;
    background: var(--surface); border-radius: var(--card-radius);
    border: 1px solid var(--border); box-shadow: var(--card-shadow);
    transition: transform 0.2s;
  }
  .timeline-item:hover { transform: translateX(4px); }
  .timeline-item::before {
    content: ''; position: absolute; left: -20px; top: 16px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent-gradient); border: 2px solid var(--bg);
  }
  .tl-date { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  .tl-title { font-size: 13px; color: var(--text-primary); font-weight: 500; }

  /* NEWS LIST */
  .news-list { list-style: none; margin: 12px 0 20px; }
  .news-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 14px; margin-bottom: 6px;
    background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border); transition: transform 0.2s;
  }
  .news-item:hover { transform: translateX(4px); }
  .news-bullet { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
  .news-text { font-size: 13px; color: var(--text-secondary); }
  .news-text strong { color: var(--text-primary); }

  /* SOURCES */
  .sources { margin-top: 32px; }
  .sources h3 { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .sources a {
    display: inline-block; font-size: 11px; color: var(--accent);
    text-decoration: none; padding: 3px 10px; margin: 2px 4px 2px 0;
    background: var(--tag-bg); border-radius: 12px; transition: 0.2s;
  }
  .sources a:hover { background: var(--accent); color: #fff; }

  /* FOOTER */
  .report-footer {
    margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
    text-align: center; font-size: 11px; color: var(--text-muted);
  }
  .report-footer .brand {
    font-weight: 700; background: var(--accent-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .report-footer a { color: var(--accent); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    .report-title { font-size: 22px; }
    .metric-row { grid-template-columns: repeat(2, 1fr); }
    .entity-row { grid-template-columns: repeat(2, 1fr); }
    .bar-label { width: 90px; font-size: 11px; }
  }
  @media print {
    body { background: #fff; }
    .container { padding: 0; }
    .metric-card, .entity-card, .timeline-item, .news-item, .chart-container, .hero-card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="report-header">
    <svg width="140" height="26" viewBox="0 0 180 32">
      <rect width="180" height="32" rx="6" fill="#1a1a2e"/>
      <text x="12" y="21" font-family="monospace" font-size="14" font-weight="700" fill="#4a6cf7">ELKO</text>
      <text x="56" y="21" font-family="monospace" font-size="10" fill="#8892b0">REPORTS</text>
      <circle cx="134" cy="16" r="3" fill="#4a6cf7"/>
      <circle cx="144" cy="16" r="3" fill="#6c63ff"/>
      <circle cx="154" cy="16" r="3" fill="#8892b0"/>
    </svg>
  </div>
  <span class="series-badge">{{SERIES}}</span>
  <h1 class="report-title">{{TITLE}}</h1>
  <div class="report-meta">
    <span>📅 {{DATE}}</span>
    <span>✍️ {{AUTHOR}}</span>
    <span>🔓 {{CLASSIFICATION}}</span>
    <span>📄 {{TYPE}}</span>
  </div>
  <hr class="divider">

  <!-- TOP STORY -->
  <div class="hero-card">
    <h2>{{TOP_HEADING}}</h2>
    <p>{{TOP_BODY}}</p>
  </div>

  {{METRICS}}

  {{CONTENT}}

  <!-- SOURCES -->
  <div class="sources">
    <h3>Sources</h3>
    {{SOURCES}}
  </div>

  <!-- FOOTER -->
  <div class="report-footer">
    Generated by <span class="brand">elko.ai</span> — Contact: <a href="mailto:reid@elko.ai">reid@elko.ai</a><br>
    <a href="{{REPO_URL}}">{{REPO_URL}}</a>
  </div>

</div>
</body>
</html>
